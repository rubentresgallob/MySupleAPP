<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="app-header">
            <button onclick="window.location.href='/dashboard.html'" class="btn-icon">←</button>
            <h1>Mi Perfil</h1>
            <div style="width: 40px;"></div>
        </header>

        <!-- Profile Info -->
        <div class="profile-section">
            <div class="profile-avatar">👤</div>
            <h2 id="userName">Usuario</h2>
            <p id="userEmail" class="user-email"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="ef8a828e8683af8a978e829f838ac18c8082">[email&#160;protected]</a></p>
        </div>

        <!-- Stats Section -->
        <div class="profile-stats">
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-info">
                    <div class="stat-title">Racha Actual</div>
                    <div id="profileStreak" class="stat-number">0 días</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-info">
                    <div class="stat-title">Racha Máxima</div>
                    <div id="profileMaxStreak" class="stat-number">0 días</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <div class="stat-title">Adherencia</div>
                    <div id="profileAdherence" class="stat-number">0%</div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="profile-actions">
            <button onclick="logout()" class="btn btn-danger">
                🚪 Cerrar Sesión
            </button>
        </div>

        <!-- Info Section -->
        <div class="info-section">
            <h3>Acerca de</h3>
            <p>App de Seguimiento de Suplementos</p>
            <p class="version">Versión Demo Web 1.0</p>
            <p class="disclaimer">⚠️ Consulta siempre con un profesional de la salud antes de tomar suplementos.</p>
        </div>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <a href="/dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Inicio</span>
            </a>
            <a href="/catalog.html" class="nav-item">
                <span class="nav-icon">📚</span>
                <span class="nav-label">Catálogo</span>
            </a>
            <a href="/history.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Historial</span>
            </a>
            <a href="/profile.html" class="nav-item active">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Perfil</span>
            </a>
        </nav>
    </div>
    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="/js/api.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
